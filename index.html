<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Aveah Systems</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    .logo {
      width: 320px;
      max-width: 80%;
      margin-bottom: 30px;
      filter: drop-shadow(0 0 10px rgba(255, 122, 0, 0.4));
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 10px;
      letter-spacing: 4px;
    }

    .coming {
      color: #ff7a00;
      font-weight: 600;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.7;
      font-size: 0.95rem;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- PUT YOUR LOGO FILE HERE -->
    <img src="as-logo-white.png" alt="Aveah Logo" class="logo" />

    <h1>AVEAH</h1>

    <div class="coming">COMING SOON</div>

    <p>
      Bringing structure, clarity, and control to real-world operations.
    </p>

  </div>
</body>
</html>
