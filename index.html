<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aveah Systems</title>

  <style>
    * {
      box-sizing: border-box;
    }
    

    body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at top, rgba(255, 122, 0, 0.18), transparent 35%),
    linear-gradient(135deg, #050505, #111111, #050505);
  color: #ffffff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

  display: flex;
  align-items: center;      /* ⬅️ center vertically */
  justify-content: center;  /* ⬅️ center horizontally */
  text-align: center;
}

    .container {
  max-width: 700px;
  width: 100%;
}

    .logo {
  width: 600px;
  max-width: 95%;
  margin-bottom: 20px;
}

.motto {
  margin-bottom: 8px;
}

.eyebrow {
  color: #ff7a00;   /* orange */
  font-weight: 800;
  letter-spacing: 0.22em;
  font-size: 0.9rem;
  margin-top: 0;
}

    p {
      margin: 18px auto 0;
      max-width: 620px;
      color: rgba(255, 255, 255, 0.72);
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      line-height: 1.6;
      font-weight: 500;
    }

    .footer {
      margin-top: 34px;
      color: rgba(255, 255, 255, 0.38);
      font-size: 0.85rem;
      letter-spacing: 0.08em;
    }

    @media (max-width: 520px) {
      .logo {
        width: 320px;
      }
  
    }
    .mycom-button {
  display: inline-block;
  margin-top: 28px;
  background: #ff7a00;
  color: white;
  text-decoration: none;
  padding: 16px 34px;
  border-radius: 14px;
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  transition: 0.2s ease;
  box-shadow: 0 0 24px rgba(255, 122, 0, 0.35);
}

.mycom-button:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 34px rgba(255, 122, 0, 0.5);
}
  </style>
</head>

<body>
  <main class="container">
    <img src="as-logo-white.png" alt="Aveah Systems logo" class="logo" />

    <p class="motto">
      Bringing structure, clarity, and control to real-world operations.
    </p>

    <div class="eyebrow">COMING SOON</div>
    <a href="mycom://home" class="mycom-button"> MYCOM ROOFING</a>


  </main>
</body>
</html>
