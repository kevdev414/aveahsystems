<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aveah Systems</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(255, 122, 0, 0.18), transparent 35%),
        linear-gradient(135deg, #050505, #111111, #050505);
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .container {
      max-width: 760px;
      width: 100%;
    }

    .logo {
      width: 700px;
      max-width: 95%;
      height: auto;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 24px rgba(255, 122, 0, 0.28));
    }

    .motto {
      margin-top: 0;
      margin-bottom: 6px;
    }

    .eyebrow {
      color: #ff7a00;
      font-weight: 800;
      letter-spacing: 0.22em;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    p {
      margin: 18px auto 0;
      max-width: 620px;
      color: rgba(255, 255, 255, 0.72);
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      line-height: 1.6;
      font-weight: 500;
    }

    .footer {
      margin-top: 34px;
      color: rgba(255, 255, 255, 0.38);
      font-size: 0.85rem;
      letter-spacing: 0.08em;
    }

    @media (max-width: 520px) {
      .logo {
        width: 320px;
      }
  
    }
  </style>
</head>

<body>
  <main class="container">
    <img src="as-logo-white.png" alt="Aveah Systems logo" class="logo" />

    <p class="motto">
      Bringing structure, clarity, and control to real-world operations.
    </p>

    <div class="eyebrow">COMING SOON</div>


  </main>
</body>
</html>
